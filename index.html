<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-VOTE OSIS Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; overflow-x: hidden; }
        .mesh-bg {
            background-image: radial-gradient(at 0% 0%, hsla(230,100%,97%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, hsla(230,100%,97%,1) 0, transparent 50%);
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        button { cursor: pointer; touch-action: manipulation; transition: all 0.2s ease; }
        button:active { transform: scale(0.95); }
        
        #auth-loading {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        .loading-hidden {
            opacity: 0 !important;
            pointer-events: none !important;
            visibility: hidden !important;
            transition: opacity 0.5s ease;
        }

        .error-box {
            background: #fee2e2;
            color: #dc2626;
            padding: 1rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            max-width: 80%;
            text-align: center;
            margin-top: 1rem;
        }
    </style>
</head>
<body class="mesh-bg min-h-screen text-slate-900 antialiased p-4">

    <!-- Loading Screen -->
    <div id="auth-loading">
        <div id="loading-spinner" class="w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
        <p id="loading-text" class="text-xs font-bold text-slate-400 animate-pulse uppercase tracking-widest">Menghubungkan ke Database...</p>
        <div id="connection-error" class="hidden error-box"></div>
    </div>

    <!-- SCREEN 1: SELECTION -->
    <div id="view-selection" class="hidden min-h-[90vh] flex flex-col items-center justify-center space-y-6 max-w-sm mx-auto">
        <div class="text-center mb-8">
            <div class="w-24 h-24 bg-white rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-2xl shadow-indigo-100 border border-slate-50 overflow-hidden p-2">
                <img src="https://image2url.com/r2/default/images/1773086135107-af77e79b-7c0b-4f47-86c4-1df916de34df.png" alt="Logo" class="w-full h-full object-contain" onerror="this.src='https://ui-avatars.com/api/?name=OSIS&background=6366f1&color=fff'">
            </div>
            <h1 class="text-3xl font-black tracking-tighter uppercase italic text-slate-900">E-VOTE <span class="text-indigo-600">OSIS</span></h1>
            <p class="text-slate-400 text-sm font-medium">Sistem Pemilihan Digital</p>
        </div>

        <button type="button" onclick="showLogin('voter')" class="w-full bg-white p-6 rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-white flex items-center gap-5 hover:bg-slate-50">
            <div class="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center text-2xl">👤</div>
            <div class="text-left">
                <h3 class="font-black text-slate-800">Masuk Siswa</h3>
                <p class="text-xs text-slate-400">Gunakan NISN</p>
            </div>
        </button>

        <button type="button" onclick="showLogin('admin')" class="w-full bg-slate-900 p-6 rounded-[2.5rem] shadow-xl shadow-slate-900/10 border border-slate-700 flex items-center gap-5 text-white hover:bg-black">
            <div class="w-14 h-14 bg-slate-800 text-indigo-400 rounded-2xl flex items-center justify-center text-2xl">⚙️</div>
            <div class="text-left">
                <h3 class="font-black text-white">Masuk Admin</h3>
                <p class="text-xs text-slate-400">Panel Kontrol</p>
            </div>
        </button>
    </div>

    <!-- SCREEN 2: LOGIN FORM -->
    <div id="view-login" class="hidden min-h-[90vh] flex items-center justify-center">
        <div id="login-card" class="p-8 rounded-[3rem] shadow-2xl w-full max-w-sm border transition-all duration-300">
            <button type="button" onclick="backToSelection()" class="text-xs font-bold mb-6 block text-inherit opacity-50 hover:opacity-100">← Kembali</button>
            <h2 class="text-2xl font-black mb-2" id="login-title">Portal Login</h2>
            <div class="space-y-4">
                <input id="login-user" type="text" placeholder="Username / NISN" class="w-full p-4 rounded-2xl border-none outline-none focus:ring-2 transition-all font-bold shadow-sm">
                <input id="login-pass" type="password" placeholder="Password" class="w-full p-4 rounded-2xl border-none outline-none focus:ring-2 transition-all font-bold shadow-sm">
                <p id="login-error" class="hidden text-red-500 text-[10px] font-bold text-center bg-red-50 p-2 rounded-lg border border-red-100"></p>
                <button type="button" id="btn-submit-login" class="w-full py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl transition-all">Masuk Sekarang</button>
            </div>
        </div>
    </div>

    <!-- SCREEN 3: VOTER PANEL -->
    <div id="view-voter" class="hidden max-w-md mx-auto py-8">
        <header class="flex justify-between items-center mb-8 px-4 bg-white p-6 rounded-[2rem] shadow-sm border border-white">
            <div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Pemilih Aktif</p>
                <h2 id="voter-name-display" class="text-xl font-black text-slate-800 tracking-tighter">-</h2>
            </div>
            <button type="button" onclick="logout()" class="w-10 h-10 bg-red-50 text-red-500 rounded-xl flex items-center justify-center font-bold shadow-sm">✕</button>
        </header>
        <div id="voter-candidates" class="space-y-6 px-2"></div>
    </div>

    <!-- SCREEN 4: ADMIN PANEL -->
    <div id="view-admin" class="hidden max-w-5xl mx-auto py-6">
        <div class="flex justify-between items-center bg-white p-4 rounded-3xl shadow-sm border border-white mb-8 px-6">
            <h2 class="font-black text-slate-800 uppercase text-xs tracking-widest italic">Dashboard Admin</h2>
            <button type="button" onclick="logout()" class="text-xs font-bold text-red-400 hover:bg-red-50 px-3 py-1 rounded-lg">Log Out</button>
        </div>
        <div class="grid md:grid-cols-2 gap-8">
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-white">
                    <h3 class="font-black text-[10px] text-slate-400 uppercase mb-4 tracking-widest">Tambah Kandidat</h3>
                    <div class="space-y-3">
                        <input id="c-name" placeholder="Nama Lengkap" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none border border-slate-100 focus:ring-2 ring-indigo-100">
                        <input id="c-photo" placeholder="URL Foto (Opsional)" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none border border-slate-100">
                        <textarea id="c-vision" placeholder="Visi & Misi" class="w-full p-3 bg-slate-50 rounded-xl text-xs outline-none h-20 border border-slate-100 focus:ring-2 ring-indigo-100"></textarea>
                        <button id="btn-save-candidate" class="w-full bg-indigo-600 text-white p-3 rounded-xl font-bold text-[10px] uppercase shadow-lg shadow-indigo-100">Simpan Kandidat</button>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-white">
                    <h3 class="font-black text-[10px] text-slate-400 uppercase mb-4 tracking-widest">Hasil Perolehan Suara</h3>
                    <div id="admin-vote-stats" class="space-y-4"></div>
                </div>
            </div>
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-white">
                    <h3 class="font-black text-[10px] text-slate-400 uppercase mb-4 tracking-widest">Daftarkan Siswa (Pemilih)</h3>
                    <div class="space-y-3 mb-6">
                        <input id="v-name" placeholder="Nama Siswa" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none border border-slate-100 focus:ring-2 ring-indigo-100">
                        <input id="v-nisn" type="number" placeholder="NISN (Untuk Login)" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none border border-slate-100">
                        <input id="v-pass" placeholder="Password Siswa" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none border border-slate-100">
                        <button id="btn-save-voter" class="w-full bg-slate-900 text-white p-3 rounded-xl font-bold text-[10px] uppercase shadow-lg shadow-slate-200">Daftarkan Siswa</button>
                    </div>
                    <div id="admin-voter-list" class="max-h-80 overflow-y-auto space-y-2 pr-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.showLogin = function(role) {
            window.currentRole = role;
            document.getElementById('view-selection').classList.add('hidden');
            document.getElementById('view-login').classList.remove('hidden');
            const card = document.getElementById('login-card');
            const title = document.getElementById('login-title');
            const subBtn = document.getElementById('btn-submit-login');
            const userIn = document.getElementById('login-user');
            const passIn = document.getElementById('login-pass');
            
            userIn.value = "";
            passIn.value = "";
            document.getElementById('login-error').classList.add('hidden');

            if(role === 'admin') {
                card.className = "bg-slate-900 p-8 rounded-[3rem] shadow-2xl w-full max-w-sm text-white";
                title.innerText = "Admin Portal";
                userIn.className = "w-full p-4 bg-slate-800 text-white rounded-2xl border-none outline-none focus:ring-2 ring-indigo-500 font-bold mb-4";
                passIn.className = "w-full p-4 bg-slate-800 text-white rounded-2xl border-none outline-none focus:ring-2 ring-indigo-500 font-bold";
                subBtn.className = "w-full bg-white text-slate-900 py-4 rounded-2xl font-black text-xs uppercase tracking-widest mt-6";
            } else {
                card.className = "bg-white p-8 rounded-[3rem] shadow-2xl w-full max-w-sm text-slate-800 border-white";
                title.innerText = "Login Siswa";
                userIn.className = "w-full p-4 bg-slate-50 text-slate-800 rounded-2xl border-none outline-none focus:ring-2 ring-indigo-200 font-bold mb-4 shadow-inner";
                passIn.className = "w-full p-4 bg-slate-50 text-slate-800 rounded-2xl border-none outline-none focus:ring-2 ring-indigo-200 font-bold shadow-inner";
                subBtn.className = "w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-indigo-100 mt-6";
            }
        };

        window.backToSelection = function() {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-selection').classList.remove('hidden');
        };

        window.logout = function() { location.reload(); };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const appId = typeof __app_id !== 'undefined' ? __app_id : "osis-v3-final";
        
        let db, auth;
        let candidates = [];
        let voters = [];
        let currentUserData = null;

        const errorEl = document.getElementById('connection-error');
        const loadingText = document.getElementById('loading-text');

        // Batas waktu inisialisasi (10 detik)
        const timeout = setTimeout(() => {
            errorEl.innerText = "Koneksi lambat atau bermasalah. Pastikan config Firebase sudah benar dan cek jaringan Anda.";
            errorEl.classList.remove('hidden');
            document.getElementById('loading-spinner').classList.add('hidden');
        }, 10000);

        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    clearTimeout(timeout);
                    setupSync();
                    document.getElementById('auth-loading').classList.add('loading-hidden');
                    document.getElementById('view-selection').classList.remove('hidden');
                }
            }, (err) => {
                errorEl.innerText = "Auth Error: " + err.message;
                errorEl.classList.remove('hidden');
            });

            async function performLogin() {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (err) {
                    errorEl.innerText = "Gagal Login Anonim: " + err.message;
                    errorEl.classList.remove('hidden');
                }
            }

            performLogin();

        } catch (globalErr) {
            errorEl.innerText = "Kritis Error: " + globalErr.message;
            errorEl.classList.remove('hidden');
        }

        function setupSync() {
            const candCol = collection(db, 'artifacts', appId, 'public', 'data', 'candidates');
            const voterCol = collection(db, 'artifacts', appId, 'public', 'data', 'voters');

            onSnapshot(candCol, (snap) => {
                candidates = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderAdminUI();
                if(currentUserData) renderVoterUI();
            }, (err) => console.error("Sync Candidates Error:", err));

            onSnapshot(voterCol, (snap) => {
                voters = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if(currentUserData) {
                    const fresh = voters.find(v => v.nisn === currentUserData.nisn);
                    if(fresh) {
                        currentUserData = fresh;
                        renderVoterUI();
                    }
                }
                renderAdminUI();
            }, (err) => console.error("Sync Voters Error:", err));
        }

        /** LOGIKA LOGIN TOMBOL **/
        document.getElementById('btn-submit-login').onclick = async () => {
            const userVal = document.getElementById('login-user').value.trim();
            const passVal = document.getElementById('login-pass').value.trim();
            const logErr = document.getElementById('login-error');
            
            logErr.classList.add('hidden');
            if(!userVal || !passVal) return;

            if(window.currentRole === 'admin') {
                if(userVal === 'admin' && passVal === 'adminosis2024') {
                    document.getElementById('view-login').classList.add('hidden');
                    document.getElementById('view-admin').classList.remove('hidden');
                } else {
                    logErr.innerText = "Username/Password Admin Salah!";
                    logErr.classList.remove('hidden');
                }
            } else {
                const voter = voters.find(v => v.nisn === userVal && v.password === passVal);
                if(voter) {
                    currentUserData = voter;
                    document.getElementById('view-login').classList.add('hidden');
                    document.getElementById('view-voter').classList.remove('hidden');
                    document.getElementById('voter-name-display').innerText = voter.name;
                    renderVoterUI();
                } else {
                    logErr.innerText = "NISN atau Password Salah!";
                    logErr.classList.remove('hidden');
                }
            }
        };

        /** PILIH KANDIDAT **/
        window.submitVote = async (candId) => {
            if (!currentUserData || currentUserData.hasVoted) return;
            try {
                await runTransaction(db, async (transaction) => {
                    const cRef = doc(db, 'artifacts', appId, 'public', 'data', 'candidates', candId);
                    const vRef = doc(db, 'artifacts', appId, 'public', 'data', 'voters', currentUserData.nisn);
                    const cDoc = await transaction.get(cRef);
                    if (!cDoc.exists()) throw "Kandidat tidak valid!";
                    transaction.update(cRef, { votes: (cDoc.data().votes || 0) + 1 });
                    transaction.update(vRef, { hasVoted: true, votedFor: candId });
                });
            } catch (e) {
                console.error("Voting Failed:", e);
                alert("Gagal memilih.");
            }
        };

        /** SIMPAN DATA ADMIN **/
        document.getElementById('btn-save-candidate').onclick = async () => {
            const name = document.getElementById('c-name').value;
            const vision = document.getElementById('c-vision').value;
            const photoUrl = document.getElementById('c-photo').value;
            if(!name || !vision) return;
            const photo = photoUrl || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=6366f1&color=fff`;
            try {
                const newRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'candidates'));
                await setDoc(newRef, { name, vision, photo, votes: 0 });
                document.getElementById('c-name').value = "";
                document.getElementById('c-vision').value = "";
                document.getElementById('c-photo').value = "";
            } catch (e) { alert("Gagal simpan."); }
        };

        document.getElementById('btn-save-voter').onclick = async () => {
            const name = document.getElementById('v-name').value;
            const nisn = document.getElementById('v-nisn').value.toString();
            const pass = document.getElementById('v-pass').value;
            if(!name || !nisn || !pass) return;
            try {
                const vRef = doc(db, 'artifacts', appId, 'public', 'data', 'voters', nisn);
                await setDoc(vRef, { name, nisn, password: pass, hasVoted: false, votedFor: null });
                document.getElementById('v-name').value = "";
                document.getElementById('v-nisn').value = "";
                document.getElementById('v-pass').value = "";
            } catch (e) { alert("Gagal daftar."); }
        };

        function renderAdminUI() {
            const stats = document.getElementById('admin-vote-stats');
            const total = candidates.reduce((a, b) => a + (b.votes || 0), 0);
            if(stats) {
                stats.innerHTML = candidates.map(c => {
                    const p = total > 0 ? Math.round((c.votes/total)*100) : 0;
                    return `<div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <div class="flex items-center gap-3 mb-2">
                             <img src="${c.photo}" class="w-8 h-8 rounded-full border border-slate-200 object-cover">
                             <div class="flex-1 flex justify-between text-[10px] font-black uppercase">
                                <span>${c.name}</span>
                                <span class="text-indigo-600">${c.votes} Suara</span>
                             </div>
                        </div>
                        <div class="w-full bg-white h-2 rounded-full overflow-hidden">
                            <div class="bg-indigo-600 h-full" style="width:${p}%"></div>
                        </div>
                    </div>`;
                }).join('') || '<p class="text-xs text-center text-slate-400 py-4 uppercase font-bold">Belum ada kandidat</p>';
            }
            const list = document.getElementById('admin-voter-list');
            if(list) {
                list.innerHTML = voters.map(v => `
                    <div class="p-3 bg-slate-50 rounded-xl text-[10px] flex justify-between items-center">
                        <span><b>${v.name}</b><br>${v.nisn}</span>
                        <span class="${v.hasVoted ? 'text-green-500' : 'text-slate-300'} font-black">${v.hasVoted ? 'SUDAH' : 'BELUM'}</span>
                    </div>
                `).join('') || '<p class="text-xs text-center text-slate-400 py-4">Belum ada pemilih</p>';
            }
        }

        function renderVoterUI() {
            const container = document.getElementById('voter-candidates');
            if(!container) return;
            if(currentUserData.hasVoted) {
                container.innerHTML = `<div class="bg-white p-10 rounded-[3rem] text-center shadow-xl border mt-10">
                    <h3 class="font-black text-slate-800 text-2xl uppercase">Pilihan Disimpan!</h3>
                    <p class="text-sm text-slate-400 mt-2">Terima kasih telah berpartisipasi.</p>
                    <button onclick="logout()" class="mt-10 w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-xs uppercase">Keluar</button>
                </div>`;
            } else {
                container.innerHTML = candidates.map((c, i) => `
                    <div class="bg-white rounded-[3rem] shadow-xl border p-8 text-center">
                        <img src="${c.photo}" class="w-24 h-24 rounded-full mx-auto mb-4 object-cover border-2 border-indigo-100">
                        <span class="text-[10px] font-black text-indigo-600 bg-indigo-50 px-4 py-1.5 rounded-full uppercase">Kandidat 0${i+1}</span>
                        <h3 class="text-2xl font-black text-slate-800 mt-3">${c.name}</h3>
                        <p class="text-xs text-slate-400 my-4">"${c.vision}"</p>
                        <button onclick="submitVote('${c.id}')" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xs uppercase">Pilih</button>
                    </div>
                `).join('');
            }
        }
    </script>
</body>
</html>
