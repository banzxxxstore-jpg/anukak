<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-VOTE OSIS Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .mesh-bg {
            background-image: radial-gradient(at 0% 0%, hsla(230,100%,97%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, hsla(230,100%,97%,1) 0, transparent 50%);
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Animasi halus untuk loading gambar */
        .logo-container img {
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        .logo-container img.loaded {
            opacity: 1;
        }
    </style>
</head>
<body class="mesh-bg min-h-screen text-slate-900 antialiased p-4">

    <!-- SCREEN 1: SELECTION -->
    <div id="view-selection" class="min-h-[90vh] flex flex-col items-center justify-center space-y-6 max-w-sm mx-auto">
        <div class="text-center mb-8">
            <!-- CUSTOM LOGO DARI LINK USER -->
            <div class="logo-container w-24 h-24 bg-white rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-2xl shadow-indigo-100 border border-slate-50 overflow-hidden p-2">
                <img 
                    src="https://image2url.com/r2/default/images/1773086135107-af77e79b-7c0b-4f47-86c4-1df916de34df.png" 
                    alt="Logo OSIS" 
                    class="w-full h-full object-contain"
                    onload="this.classList.add('loaded')"
                    onerror="this.src='https://ui-avatars.com/api/?name=OSIS&background=6366f1&color=fff'"
                >
            </div>
            <h1 class="text-3xl font-black tracking-tighter uppercase italic">E-VOTE <span class="text-indigo-600">OSIS</span></h1>
            <p class="text-slate-400 text-sm font-medium">Sistem Pemilihan Digital Terpercaya</p>
        </div>

        <button onclick="showLogin('voter')" class="w-full bg-white p-6 rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-white flex items-center gap-5 hover:scale-[1.02] transition-all">
            <div class="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center text-2xl">👤</div>
            <div class="text-left">
                <h3 class="font-black text-slate-800">Masuk Siswa</h3>
                <p class="text-xs text-slate-400">Gunakan NISN untuk memilih</p>
            </div>
        </button>

        <button onclick="showLogin('admin')" class="w-full bg-slate-900 p-6 rounded-[2.5rem] shadow-xl shadow-slate-900/10 border border-slate-700 flex items-center gap-5 hover:scale-[1.02] transition-all text-white">
            <div class="w-14 h-14 bg-slate-800 text-indigo-400 rounded-2xl flex items-center justify-center text-2xl">⚙️</div>
            <div class="text-left">
                <h3 class="font-black text-white">Masuk Admin</h3>
                <p class="text-xs text-slate-400">Kelola data & hasil</p>
            </div>
        </button>
    </div>

    <!-- SCREEN 2: LOGIN FORM -->
    <div id="view-login" class="hidden min-h-[90vh] flex items-center justify-center">
        <div id="login-card" class="p-8 rounded-[3.5rem] shadow-2xl w-full max-w-sm border transition-colors duration-500">
            <button onclick="backToSelection()" class="text-xs font-bold mb-6 block" id="btn-back">← Kembali</button>
            <h2 class="text-2xl font-black mb-2" id="login-title">Portal Login</h2>
            <p class="text-xs mb-8 opacity-60" id="login-subtitle">Silahkan masukkan kredensial Anda</p>
            
            <div class="space-y-4">
                <input id="login-user" type="text" placeholder="Username" class="w-full p-4 rounded-2xl border-none outline-none focus:ring-2 transition-all font-bold">
                <input id="login-pass" type="password" placeholder="Password" class="w-full p-4 rounded-2xl border-none outline-none focus:ring-2 transition-all font-bold">
                <p id="login-error" class="hidden text-red-500 text-xs font-bold text-center"></p>
                <button onclick="handleLoginAction()" id="btn-submit" class="w-full py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl transition-all">Masuk Sekarang</button>
            </div>
        </div>
    </div>

    <!-- SCREEN 3: VOTER PANEL -->
    <div id="view-voter" class="hidden max-w-md mx-auto py-8">
        <header class="flex justify-between items-center mb-8 px-4 bg-white p-6 rounded-[2rem] shadow-sm">
            <div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Pemilih Aktif</p>
                <h2 id="voter-name-display" class="text-xl font-black text-slate-800 tracking-tighter">-</h2>
            </div>
            <button onclick="logout()" class="w-10 h-10 bg-red-50 text-red-500 rounded-xl flex items-center justify-center font-bold">✕</button>
        </header>
        <div id="voter-candidates" class="space-y-6"></div>
    </div>

    <!-- SCREEN 4: ADMIN PANEL -->
    <div id="view-admin" class="hidden max-w-4xl mx-auto py-6">
        <div class="flex justify-between items-center bg-white p-4 rounded-3xl shadow-sm border border-white mb-8 px-6">
            <h2 class="font-black text-slate-800 uppercase text-xs tracking-widest italic">Dashboard Administrator</h2>
            <button onclick="logout()" class="text-xs font-bold text-red-400 hover:bg-red-50 px-3 py-1 rounded-lg">Log Out</button>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-white">
                    <h3 class="font-black text-[10px] text-slate-400 uppercase mb-4 tracking-widest">Input Kandidat Baru</h3>
                    <div class="space-y-2">
                        <input id="c-name" placeholder="Nama Lengkap Kandidat" class="w-full p-3 bg-slate-50 rounded-xl text-xs outline-none focus:ring-2 ring-indigo-100">
                        <textarea id="c-vision" placeholder="Visi & Misi Singkat" class="w-full p-3 bg-slate-50 rounded-xl text-xs outline-none h-20 focus:ring-2 ring-indigo-100"></textarea>
                        <button onclick="saveCandidate()" class="w-full bg-indigo-600 text-white p-3 rounded-xl font-bold text-[10px] uppercase">Simpan Calon</button>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-white">
                    <h3 class="font-black text-[10px] text-slate-400 uppercase mb-4 tracking-widest">Perolehan Suara Real-time</h3>
                    <div id="admin-vote-stats" class="space-y-4"></div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-white">
                    <h3 class="font-black text-[10px] text-slate-400 uppercase mb-4 tracking-widest">Registrasi Siswa (Pemilih)</h3>
                    <div class="space-y-2 mb-6">
                        <input id="v-name" placeholder="Nama Lengkap Siswa" class="w-full p-3 bg-slate-50 rounded-xl text-xs outline-none">
                        <div class="grid grid-cols-2 gap-2">
                            <input id="v-nisn" type="number" placeholder="NISN" class="w-full p-3 bg-slate-50 rounded-xl text-xs outline-none">
                            <input id="v-pass" placeholder="Password" class="w-full p-3 bg-slate-50 rounded-xl text-xs outline-none">
                        </div>
                        <button onclick="saveVoter()" class="w-full bg-slate-900 text-white p-3 rounded-xl font-bold text-[10px] uppercase">Daftarkan Pemilih</button>
                    </div>
                    <div id="admin-voter-list" class="max-h-60 overflow-y-auto space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        // --- CONFIG HANDLING ---
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const appId = typeof __app_id !== 'undefined' ? __app_id : "osis-v3-prod"; 
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentRole = null; 
        let currentUserData = null;
        let candidates = [];
        let voters = [];

        // --- NAVIGATION ---
        window.showLogin = (role) => {
            currentRole = role;
            const card = document.getElementById('login-card');
            const title = document.getElementById('login-title');
            const sub = document.getElementById('login-subtitle');
            const userInput = document.getElementById('login-user');
            const submitBtn = document.getElementById('btn-submit');
            const backBtn = document.getElementById('btn-back');

            document.getElementById('view-selection').classList.add('hidden');
            document.getElementById('view-login').classList.remove('hidden');

            if(role === 'admin') {
                card.className = "bg-slate-900 p-8 rounded-[3.5rem] shadow-2xl w-full max-w-sm border border-slate-800 text-white";
                title.innerText = "Admin Portal";
                sub.innerText = "Khusus otoritas panitia pemilihan";
                userInput.placeholder = "Username Admin";
                userInput.type = "text"; 
                userInput.className = "w-full p-4 bg-slate-800 text-white rounded-2xl border-none outline-none focus:ring-2 ring-indigo-500 font-bold";
                document.getElementById('login-pass').className = "w-full p-4 bg-slate-800 text-white rounded-2xl border-none outline-none focus:ring-2 ring-indigo-500 font-bold";
                submitBtn.className = "w-full bg-white text-slate-900 py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-indigo-400 transition-all";
                backBtn.className = "text-xs font-bold text-slate-500 mb-6 hover:text-white block";
            } else {
                card.className = "bg-white p-8 rounded-[3.5rem] shadow-2xl w-full max-w-sm border border-white text-slate-800";
                title.innerText = "Portal Siswa";
                sub.innerText = "Silahkan masuk menggunakan NISN";
                userInput.placeholder = "Masukkan NISN Anda";
                userInput.type = "number"; 
                userInput.className = "w-full p-4 bg-slate-50 text-slate-800 rounded-2xl border-none outline-none focus:ring-2 ring-indigo-200 font-bold";
                document.getElementById('login-pass').className = "w-full p-4 bg-slate-50 text-slate-800 rounded-2xl border-none outline-none focus:ring-2 ring-indigo-200 font-bold";
                submitBtn.className = "w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100";
                backBtn.className = "text-xs font-bold text-slate-400 mb-6 hover:text-indigo-600 block";
            }
        };

        window.backToSelection = () => {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-selection').classList.remove('hidden');
            document.getElementById('login-error').classList.add('hidden');
        };

        window.handleLoginAction = () => {
            const userVal = document.getElementById('login-user').value;
            const passVal = document.getElementById('login-pass').value;
            const errorEl = document.getElementById('login-error');
            errorEl.classList.add('hidden');

            if(currentRole === 'admin') {
                if(userVal === 'admin' && passVal === 'adminosis2024') {
                    document.getElementById('view-login').classList.add('hidden');
                    document.getElementById('view-admin').classList.remove('hidden');
                } else {
                    errorEl.innerText = "Kredensial Admin Salah!";
                    errorEl.classList.remove('hidden');
                }
            } else {
                const voter = voters.find(v => v.nisn === userVal && v.password === passVal);
                if(voter) {
                    currentUserData = voter;
                    document.getElementById('view-login').classList.add('hidden');
                    document.getElementById('view-voter').classList.remove('hidden');
                    document.getElementById('voter-name-display').innerText = voter.name;
                    renderVoterUI();
                } else {
                    errorEl.innerText = "NISN atau Password Salah!";
                    errorEl.classList.remove('hidden');
                }
            }
        };

        window.logout = () => {
            currentUserData = null;
            document.querySelectorAll('[id^="view-"]').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-selection').classList.remove('hidden');
            document.querySelectorAll('input, textarea').forEach(i => i.value = '');
        };

        // --- AUTH & DATA SYNC ---
        const initApp = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }

            onAuthStateChanged(auth, (user) => {
                if (!user) return;

                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'candidates'), (snap) => {
                    candidates = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    renderAdminUI();
                    if(currentUserData) renderVoterUI();
                }, (err) => console.error("Snapshot error (candidates):", err));

                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'voters'), (snap) => {
                    voters = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    if(currentUserData) {
                        currentUserData = voters.find(v => v.nisn === currentUserData.nisn);
                        renderVoterUI();
                    }
                    renderAdminUI();
                }, (err) => console.error("Snapshot error (voters):", err));
            });
        };

        window.onload = initApp;

        // --- ACTIONS ---
        window.saveCandidate = async () => {
            if (!auth.currentUser) return;
            const n = document.getElementById('c-name').value;
            const v = document.getElementById('c-vision').value;
            if(!n || !v) return;
            const ref = doc(collection(db, 'artifacts', appId, 'public', 'data', 'candidates'));
            await setDoc(ref, { name: n, vision: v, votes: 0, photo: `https://ui-avatars.com/api/?name=${encodeURIComponent(n)}&background=random` });
            document.getElementById('c-name').value = '';
            document.getElementById('c-vision').value = '';
        };

        window.saveVoter = async () => {
            if (!auth.currentUser) return;
            const n = document.getElementById('v-name').value;
            const ni = document.getElementById('v-nisn').value.toString();
            const p = document.getElementById('v-pass').value;
            if(!n || !ni || !p) return;
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'voters', ni), { name: n, nisn: ni, password: p, hasVoted: false });
            document.querySelectorAll('#v-name, #v-nisn, #v-pass').forEach(i => i.value = '');
        };

        window.deleteVoterData = async (nisn) => {
            if (!auth.currentUser) return;
            if(confirm("Hapus data pemilih ini?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'voters', nisn));
            }
        };

        window.submitVote = async (candId) => {
            if(!auth.currentUser || !currentUserData || currentUserData.hasVoted) return;
            const cand = candidates.find(c => c.id === candId);
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'candidates', candId), { votes: (cand.votes || 0) + 1 });
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'voters', currentUserData.nisn), { hasVoted: true });
        };

        // --- RENDERING UI ---
        function renderAdminUI() {
            const totalVotes = voters.filter(v => v.hasVoted).length;
            const statsContainer = document.getElementById('admin-vote-stats');
            if (statsContainer) {
                statsContainer.innerHTML = candidates.map(c => {
                    const perc = totalVotes > 0 ? Math.round((c.votes / totalVotes) * 100) : 0;
                    return `
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <div class="flex justify-between text-xs font-bold mb-2 uppercase">
                                <span>${c.name}</span>
                                <span class="text-indigo-600">${perc}%</span>
                            </div>
                            <div class="w-full bg-white h-2 rounded-full overflow-hidden">
                                <div class="bg-indigo-600 h-full transition-all" style="width: ${perc}%"></div>
                            </div>
                            <p class="text-[9px] mt-2 font-black text-slate-400 uppercase tracking-tighter">${c.votes} SUARA</p>
                        </div>
                    `;
                }).join('') || '<p class="text-center text-slate-300 py-4 text-xs italic">Belum ada kandidat</p>';
            }

            const voterListContainer = document.getElementById('admin-voter-list');
            if (voterListContainer) {
                voterListContainer.innerHTML = voters.map(v => `
                    <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl text-[11px]">
                        <div>
                            <p class="font-black text-slate-700">${v.name}</p>
                            <p class="text-slate-400">NISN: ${v.nisn}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="${v.hasVoted ? 'text-green-500' : 'text-slate-300'} font-black uppercase text-[9px]">${v.hasVoted ? 'Voted' : 'Ready'}</span>
                            <button onclick="deleteVoterData('${v.nisn}')" class="text-red-300 hover:text-red-500 font-bold">✕</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        function renderVoterUI() {
            const container = document.getElementById('voter-candidates');
            if(!container) return;
            if(currentUserData && currentUserData.hasVoted) {
                container.innerHTML = `
                    <div class="bg-white p-12 rounded-[3rem] text-center shadow-2xl border border-white">
                        <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-3xl mx-auto mb-6">✓</div>
                        <h3 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">SUARA TERKIRIM</h3>
                        <p class="text-slate-400 mt-2 text-sm">Terima kasih telah berkontribusi!</p>
                        <button onclick="logout()" class="mt-8 px-8 py-3 bg-slate-100 text-slate-500 rounded-2xl font-bold text-xs">Keluar Sistem</button>
                    </div>
                `;
            } else {
                container.innerHTML = candidates.map((c, i) => `
                    <div class="bg-white rounded-[2.5rem] overflow-hidden shadow-xl border border-white">
                        <img src="${c.photo}" class="w-full h-48 object-cover">
                        <div class="p-8 text-center">
                            <span class="text-[10px] font-black text-indigo-500 bg-indigo-50 px-4 py-1 rounded-full uppercase tracking-widest">Kandidat 0${i+1}</span>
                            <h3 class="text-2xl font-black text-slate-800 mt-2 tracking-tight">${c.name}</h3>
                            <p class="text-slate-400 text-sm mt-3 mb-8 italic">"${c.vision}"</p>
                            <button onclick="submitVote('${c.id}')" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-indigo-600 transition-all shadow-lg shadow-slate-200">Berikan Suara</button>
                        </div>
                    </div>
                `).join('');
            }
        }
    </script>
</body>
</html>
