<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-VOTE OSIS Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; overflow-x: hidden; }
        .mesh-bg {
            background-image: radial-gradient(at 0% 0%, hsla(230,100%,97%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, hsla(230,100%,97%,1) 0, transparent 50%);
        }
        #auth-loading {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .loading-hidden { opacity: 0; pointer-events: none; visibility: hidden; transition: all 0.5s ease; }
        .error-badge { background: #fee2e2; color: #dc2626; padding: 0.5rem 1rem; border-radius: 99px; font-size: 0.7rem; font-weight: 800; border: 1px solid #fecaca; margin-bottom: 1rem; }
    </style>
</head>
<body class="mesh-bg min-h-screen text-slate-900 antialiased p-4">

    <!-- Screen: Loading & Auth Guard -->
    <div id="auth-loading">
        <div id="loading-content" class="flex flex-col items-center">
            <div class="w-12 h-12 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
            <p id="status-text" class="text-[10px] font-black text-slate-400 uppercase tracking-widest animate-pulse">Menghubungkan Database...</p>
        </div>
        
        <!-- UI jika Config Gagal Terbaca -->
        <div id="config-error-ui" class="hidden flex flex-col items-center max-w-xs px-6 text-center">
            <div class="error-badge italic uppercase">Konfigurasi Tidak Ditemukan</div>
            <p class="text-[11px] text-slate-500 mb-6">Pastikan 'firebaseConfig' sudah terpasang dengan benar di environment platform Anda.</p>
            <textarea id="manual-config-input" class="w-full h-32 p-3 text-[10px] font-mono bg-slate-50 border border-slate-200 rounded-2xl mb-4" placeholder='{ "apiKey": "...", "projectId": "...", ... }'></textarea>
            <button onclick="saveManualConfig()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-indigo-100">Hubungkan Secara Manual</button>
        </div>
    </div>

    <!-- Screen: Selection -->
    <div id="view-selection" class="hidden min-h-[85vh] flex flex-col items-center justify-center space-y-6 max-w-sm mx-auto">
        <div class="text-center mb-6">
            <div class="w-20 h-20 bg-white rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-xl border border-slate-50">
                <span class="text-4xl">🗳️</span>
            </div>
            <h1 class="text-3xl font-black tracking-tighter uppercase italic text-slate-900">E-VOTE <span class="text-indigo-600">OSIS</span></h1>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Digital Voting System v3.1</p>
        </div>

        <button onclick="openLogin('voter')" class="w-full bg-white p-6 rounded-[2.5rem] shadow-xl shadow-slate-200/40 border border-white flex items-center gap-5 active:scale-95 transition-transform">
            <div class="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center text-2xl">👤</div>
            <div class="text-left">
                <h3 class="font-black text-slate-800">Login Siswa</h3>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wide">Gunakan NISN & Pass</p>
            </div>
        </button>

        <button onclick="openLogin('admin')" class="w-full bg-slate-900 p-6 rounded-[2.5rem] shadow-xl shadow-slate-900/10 border border-slate-700 flex items-center gap-5 text-white active:scale-95 transition-transform">
            <div class="w-14 h-14 bg-slate-800 text-indigo-400 rounded-2xl flex items-center justify-center text-2xl">⚙️</div>
            <div class="text-left">
                <h3 class="font-black text-white">Login Panitia</h3>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wide">Panel Administrasi</p>
            </div>
        </button>
    </div>

    <!-- Screen: Login Form -->
    <div id="view-login" class="hidden min-h-[85vh] flex items-center justify-center">
        <div id="login-card" class="p-8 rounded-[3rem] shadow-2xl w-full max-w-sm border transition-all">
            <button onclick="goBack()" class="text-[10px] font-black mb-8 block opacity-40 uppercase tracking-widest">← Kembali</button>
            <h2 class="text-2xl font-black mb-6 tracking-tighter" id="login-title">Portal Akses</h2>
            <div class="space-y-4">
                <input id="login-user" type="text" placeholder="Username / NISN" class="w-full p-4 rounded-2xl border-none outline-none focus:ring-2 font-bold shadow-sm text-sm">
                <input id="login-pass" type="password" placeholder="Password" class="w-full p-4 rounded-2xl border-none outline-none focus:ring-2 font-bold shadow-sm text-sm">
                <p id="login-error" class="hidden text-red-500 text-[10px] font-bold text-center bg-red-50 p-3 rounded-xl border border-red-100"></p>
                <button id="btn-do-login" class="w-full py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Konfirmasi Masuk</button>
            </div>
        </div>
    </div>

    <!-- Screen: Voter (Siswa) -->
    <div id="view-voter" class="hidden max-w-md mx-auto py-6">
        <div class="bg-white p-5 rounded-3xl shadow-sm border border-white flex justify-between items-center mb-6 mx-2">
            <div>
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Siswa Terverifikasi</p>
                <h2 id="display-voter-name" class="text-lg font-black text-slate-800 tracking-tight">-</h2>
            </div>
            <button onclick="location.reload()" class="w-10 h-10 bg-red-50 text-red-500 rounded-xl flex items-center justify-center font-bold">✕</button>
        </div>
        <div id="candidate-list" class="space-y-5 px-2"></div>
    </div>

    <!-- Screen: Admin -->
    <div id="view-admin" class="hidden max-w-5xl mx-auto py-4">
        <div class="flex justify-between items-center bg-white p-4 rounded-3xl shadow-sm border border-white mb-6 mx-2 px-6">
            <h2 class="font-black text-slate-800 uppercase text-[10px] tracking-widest italic">Admin Dashboard</h2>
            <button onclick="location.reload()" class="text-[10px] font-black text-red-500 bg-red-50 px-4 py-2 rounded-xl uppercase">Logout</button>
        </div>
        
        <div class="grid lg:grid-cols-2 gap-6 px-2">
            <!-- Left: Stats & Candidates -->
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-white">
                    <h3 class="font-black text-[10px] text-slate-400 uppercase mb-4 tracking-widest">Perolehan Suara</h3>
                    <div id="vote-stats-container" class="space-y-4"></div>
                </div>
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-white">
                    <h3 class="font-black text-[10px] text-slate-400 uppercase mb-4 tracking-widest">Input Kandidat Baru</h3>
                    <div class="space-y-3">
                        <input id="new-c-name" placeholder="Nama Lengkap" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none border border-slate-100">
                        <textarea id="new-c-vision" placeholder="Visi & Misi Ringkas" class="w-full p-3 bg-slate-50 rounded-xl text-xs outline-none h-20 border border-slate-100"></textarea>
                        <button id="save-candidate-btn" class="w-full bg-indigo-600 text-white p-3 rounded-xl font-bold text-[10px] uppercase tracking-widest">Simpan Data</button>
                    </div>
                </div>
            </div>
            <!-- Right: Voter List -->
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-white">
                <h3 class="font-black text-[10px] text-slate-400 uppercase mb-4 tracking-widest">Registrasi Pemilih</h3>
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <input id="new-v-name" placeholder="Nama Siswa" class="col-span-2 p-3 bg-slate-50 rounded-xl text-xs font-bold border border-slate-100">
                    <input id="new-v-nisn" placeholder="NISN" class="p-3 bg-slate-50 rounded-xl text-xs font-bold border border-slate-100">
                    <input id="new-v-pass" placeholder="Password" class="p-3 bg-slate-50 rounded-xl text-xs font-bold border border-slate-100">
                </div>
                <button id="save-voter-btn" class="w-full bg-slate-900 text-white p-3 rounded-xl font-bold text-[10px] uppercase tracking-widest mb-6">Tambahkan Siswa</button>
                <div id="voter-table" class="space-y-2 max-h-[400px] overflow-y-auto pr-2"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, runTransaction, query } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        let db, auth;
        let candidates = [];
        let voters = [];
        let currentUser = null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : "osis-v3-final";

        // Logic Initialization
        async function initFirebase(config) {
            if (!config || !config.projectId) {
                showConfigError();
                return;
            }

            try {
                const app = initializeApp(config);
                db = getFirestore(app);
                auth = getAuth(app);

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        console.log("Auth Success:", user.uid);
                        startSyncing();
                        document.getElementById('auth-loading').classList.add('loading-hidden');
                        document.getElementById('view-selection').classList.remove('hidden');
                    }
                });

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Firebase Init Error:", err);
                showConfigError();
            }
        }

        function showConfigError() {
            document.getElementById('loading-content').classList.add('hidden');
            document.getElementById('config-error-ui').classList.remove('hidden');
        }

        window.saveManualConfig = () => {
            const raw = document.getElementById('manual-config-input').value;
            try {
                const config = JSON.parse(raw);
                localStorage.setItem('osis_config_fix', raw);
                location.reload();
            } catch (e) { alert("Format JSON salah!"); }
        };

        // Pencarian Config Otomatis
        const savedConfig = localStorage.getItem('osis_config_fix');
        const envConfigRaw = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
        let finalConfig = null;

        try {
            if (envConfigRaw) {
                finalConfig = typeof envConfigRaw === 'string' ? JSON.parse(envConfigRaw) : envConfigRaw;
            } else if (savedConfig) {
                finalConfig = JSON.parse(savedConfig);
            }
        } catch (e) { console.error("Config Parse Error"); }

        initFirebase(finalConfig);

        function startSyncing() {
            if (!auth.currentUser) return;

            const cCol = collection(db, 'artifacts', appId, 'public', 'data', 'candidates');
            const vCol = collection(db, 'artifacts', appId, 'public', 'data', 'voters');

            onSnapshot(cCol, (s) => {
                candidates = s.docs.map(d => ({ id: d.id, ...d.data() }));
                updateAdminDisplay();
                if (currentUser) updateVoterDisplay();
            }, (e) => console.error("Sync Candidates Error:", e));

            onSnapshot(vCol, (s) => {
                voters = s.docs.map(d => ({ id: d.id, ...d.data() }));
                if (currentUser) {
                    const updated = voters.find(v => v.nisn === currentUser.nisn);
                    if (updated) { currentUser = updated; updateVoterDisplay(); }
                }
                updateAdminDisplay();
            }, (e) => console.error("Sync Voters Error:", e));
        }

        /** VIEW CONTROLLER **/
        window.openLogin = (role) => {
            window.activeRole = role;
            document.getElementById('view-selection').classList.add('hidden');
            document.getElementById('view-login').classList.remove('hidden');
            
            const card = document.getElementById('login-card');
            const btn = document.getElementById('btn-do-login');
            
            if (role === 'admin') {
                card.className = "bg-slate-900 p-8 rounded-[3rem] shadow-2xl w-full max-w-sm text-white border-slate-800";
                btn.className = "w-full bg-indigo-500 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest mt-4";
            } else {
                card.className = "bg-white p-8 rounded-[3rem] shadow-2xl w-full max-w-sm text-slate-900 border-white";
                btn.className = "w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest mt-4 shadow-lg shadow-indigo-100";
            }
        };

        window.goBack = () => {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-selection').classList.remove('hidden');
        };

        document.getElementById('btn-do-login').onclick = () => {
            const u = document.getElementById('login-user').value.trim();
            const p = document.getElementById('login-pass').value.trim();
            const err = document.getElementById('login-error');
            err.classList.add('hidden');

            if (window.activeRole === 'admin') {
                if (u === 'admin' && p === 'adminosis2024') {
                    document.getElementById('view-login').classList.add('hidden');
                    document.getElementById('view-admin').classList.remove('hidden');
                } else {
                    err.innerText = "Kredensial Admin Salah!";
                    err.classList.remove('hidden');
                }
            } else {
                const match = voters.find(v => v.nisn === u && v.password === p);
                if (match) {
                    currentUser = match;
                    document.getElementById('view-login').classList.add('hidden');
                    document.getElementById('view-voter').classList.remove('hidden');
                    document.getElementById('display-voter-name').innerText = match.name;
                    updateVoterDisplay();
                } else {
                    err.innerText = "NISN atau Password tidak ditemukan!";
                    err.classList.remove('hidden');
                }
            }
        };

        window.processVote = async (id) => {
            if (!currentUser || currentUser.hasVoted) return;
            const cRef = doc(db, 'artifacts', appId, 'public', 'data', 'candidates', id);
            const vRef = doc(db, 'artifacts', appId, 'public', 'data', 'voters', currentUser.nisn);

            try {
                await runTransaction(db, async (tx) => {
                    const cDoc = await tx.get(cRef);
                    tx.update(cRef, { votes: (cDoc.data().votes || 0) + 1 });
                    tx.update(vRef, { hasVoted: true, votedFor: id });
                });
            } catch (e) { alert("Terjadi kesalahan saat memilih."); }
        };

        // Admin Actions
        document.getElementById('save-candidate-btn').onclick = async () => {
            const name = document.getElementById('new-c-name').value;
            const vision = document.getElementById('new-c-vision').value;
            if(!name || !vision) return;
            await setDoc(doc(collection(db, 'artifacts', appId, 'public', 'data', 'candidates')), { 
                name, vision, votes: 0, 
                img: `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=6366f1&color=fff` 
            });
            document.getElementById('new-c-name').value = ""; document.getElementById('new-c-vision').value = "";
        };

        document.getElementById('save-voter-btn').onclick = async () => {
            const n = document.getElementById('new-v-name').value;
            const ni = document.getElementById('new-v-nisn').value;
            const pa = document.getElementById('new-v-pass').value;
            if(!n || !ni || !pa) return;
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'voters', ni), { name: n, nisn: ni, password: pa, hasVoted: false });
            document.getElementById('new-v-name').value = ""; document.getElementById('new-v-nisn').value = ""; document.getElementById('new-v-pass').value = "";
        };

        function updateAdminDisplay() {
            const stats = document.getElementById('vote-stats-container');
            const total = candidates.reduce((a, b) => a + (b.votes || 0), 0);
            if (stats) {
                stats.innerHTML = candidates.map(c => {
                    const pct = total > 0 ? Math.round((c.votes/total)*100) : 0;
                    return `<div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <div class="flex justify-between text-[10px] font-black uppercase mb-2">
                            <span>${c.name}</span>
                            <span class="text-indigo-600">${c.votes} Suara (${pct}%)</span>
                        </div>
                        <div class="w-full bg-white h-2 rounded-full overflow-hidden">
                            <div class="bg-indigo-600 h-full transition-all duration-700" style="width:${pct}%"></div>
                        </div>
                    </div>`;
                }).join('') || '<p class="text-[10px] text-center text-slate-400 py-4 uppercase font-bold italic">Belum ada kandidat</p>';
            }
            const table = document.getElementById('voter-table');
            if (table) {
                table.innerHTML = voters.map(v => `
                    <div class="p-3 bg-slate-50 rounded-xl flex justify-between items-center border border-slate-100">
                        <div class="text-left">
                            <p class="text-[10px] font-black text-slate-800">${v.name}</p>
                            <p class="text-[8px] text-slate-400 font-bold">${v.nisn}</p>
                        </div>
                        <div class="text-[8px] font-black px-3 py-1 rounded-full ${v.hasVoted ? 'bg-green-100 text-green-600' : 'bg-orange-100 text-orange-600'} uppercase">
                            ${v.hasVoted ? 'Voted' : 'Pending'}
                        </div>
                    </div>
                `).join('');
            }
        }

        function updateVoterDisplay() {
            const list = document.getElementById('candidate-list');
            if (currentUser.hasVoted) {
                list.innerHTML = `<div class="bg-white p-10 rounded-[3rem] text-center shadow-xl border border-white mt-10">
                    <div class="text-5xl mb-4">✅</div>
                    <h3 class="font-black text-slate-800 text-xl uppercase tracking-tighter">Partisipasi Berhasil!</h3>
                    <p class="text-[11px] text-slate-400 mt-2 font-medium">Terima kasih telah menyalurkan suara Anda demi kemajuan OSIS yang lebih baik.</p>
                </div>`;
                return;
            }
            list.innerHTML = candidates.map((c, i) => `
                <div class="bg-white rounded-[2.5rem] shadow-xl border border-white p-6 flex flex-col items-center text-center">
                    <img src="${c.img}" class="w-20 h-20 rounded-2xl mb-4 object-cover shadow-lg">
                    <span class="text-[9px] font-black text-indigo-600 bg-indigo-50 px-4 py-1 rounded-full uppercase mb-2">Paslon 0${i+1}</span>
                    <h3 class="text-lg font-black text-slate-800">${c.name}</h3>
                    <p class="text-[10px] text-slate-400 my-4 leading-relaxed font-medium italic">"${c.vision}"</p>
                    <button onclick="processVote('${c.id}')" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-lg shadow-indigo-100 active:scale-95 transition-all">Pilih Kandidat</button>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
