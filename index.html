<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Voting OSIS Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        // ============================================================
        // DATA FIREBASE ANDA SUDAH TERPASANG DI SINI
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDFD_ZOL4RAyaadaGdk5PJb8BIwG6GInOE",
            authDomain: "testsaja-39ab7.firebaseapp.com",
            projectId: "testsaja-39ab7",
            storageBucket: "testsaja-39ab7.firebasestorage.app",
            messagingSenderId: "503650943182",
            appId: "1:503650943182:web:eec5678291f3bf2774509f",
            measurementId: "G-VSQ3SHGHQL"
        };
        // ============================================================

        const appId = "osis-v1"; 
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let isAdmin = false;
        let candidates = [];
        let voters = [];

        window.onload = async () => {
            // Login otomatis secara anonim agar bisa akses database
            await signInAnonymously(auth);
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    // Ambil data Kandidat secara Realtime
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'candidates'), (s) => {
                        candidates = s.docs.map(d => ({ id: d.id, ...d.data() }));
                        updateUI();
                    });
                    // Ambil data Pemilih secara Realtime
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'voters'), (s) => {
                        voters = s.docs.map(d => ({ id: d.id, ...d.data() }));
                        updateUI();
                    });
                }
            });
        };

        window.handleLogin = () => {
            const userIn = document.getElementById('u').value.trim();
            const passIn = document.getElementById('p').value;
            
            // Login Admin
            if (userIn === 'admin' && passIn === 'adminosis2024') {
                isAdmin = true; currentUser = null; show('admin-v'); renderAdmin(); return;
            }
            
            // Login Siswa
            const v = voters.find(x => x.nisn === userIn && x.password === passIn);
            if (v) { 
                currentUser = v; isAdmin = false; show('voter-v'); renderVoter(); 
            } else { 
                alert("NISN atau Password Salah!"); 
            }
        };

        window.logout = () => {
            currentUser = null; isAdmin = false; show('login-v');
        };

        window.addCandidate = async () => {
            const n = document.getElementById('cn').value;
            const v = document.getElementById('cv').value;
            if(!n || !v) return alert("Isi nama & visi");
            await setDoc(doc(collection(db, 'artifacts', appId, 'public', 'data', 'candidates')), { name: n, vision: v, votes: 0 });
            document.getElementById('cn').value = ''; document.getElementById('cv').value = '';
            alert("Kandidat berhasil ditambah!");
        };

        window.addVoter = async () => {
            const n = document.getElementById('vn').value;
            const ni = document.getElementById('vi').value;
            const p = document.getElementById('vp').value;
            if(!n || !ni || !p) return alert("Lengkapi data siswa");
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'voters', ni), { name: n, nisn: ni, password: p, hasVoted: false });
            document.getElementById('vn').value = ''; document.getElementById('vi').value = ''; document.getElementById('vp').value = '';
            alert("Siswa berhasil didaftarkan!");
        };

        window.castVote = async (id) => {
            const freshVoter = voters.find(x => x.nisn === currentUser.nisn);
            if (freshVoter.hasVoted) return alert("Anda sudah menggunakan hak pilih!");
            
            const c = candidates.find(x => x.id === id);
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'candidates', id), { votes: (c.votes || 0) + 1 });
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'voters', currentUser.nisn), { hasVoted: true });
            alert("Terima kasih! Suara Anda telah masuk.");
        };

        function updateUI() { if (isAdmin) renderAdmin(); if (currentUser) renderVoter(); }
        function show(id) { document.querySelectorAll('.v').forEach(x => x.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }

        function renderAdmin() {
            const vtd = voters.filter(x => x.hasVoted).length;
            document.getElementById('res').innerHTML = candidates.map(c => `
                <div class="mb-3 p-3 bg-indigo-50 rounded-xl border border-indigo-100">
                    <div class="flex justify-between font-bold text-sm mb-1">
                        <span>${c.name}</span>
                        <span class="text-indigo-600">${c.votes} Suara</span>
                    </div>
                </div>
            `).join('');
            document.getElementById('list').innerHTML = voters.map(v => `
                <div class="flex justify-between text-sm border-b py-2 items-center">
                    <span>${v.name} <small class="text-gray-400">(${v.nisn})</small></span>
                    <span class="${v.hasVoted ? 'text-green-500 font-bold' : 'text-gray-300 text-xs'}">${v.hasVoted ? 'SUDAH' : 'BELUM'}</span>
                </div>
            `).join('');
        }

        function renderVoter() {
            const me = voters.find(x => x.nisn === currentUser.nisn);
            document.getElementById('voter-name').innerText = me.name;
            if (me.hasVoted) { 
                document.getElementById('cards').innerHTML = `
                    <div class="bg-green-100 text-green-700 p-10 rounded-[3rem] font-bold">
                        <p class="text-2xl mb-2">Pilihan Terkirim!</p>
                        <p class="text-sm font-normal">Anda telah berhasil berpartisipasi dalam e-voting ini.</p>
                    </div>
                `; 
            } else {
                document.getElementById('cards').innerHTML = candidates.map(c => `
                    <div class="p-6 bg-white shadow-lg rounded-[2.5rem] mb-6 border border-gray-50">
                        <h3 class="font-black text-2xl text-gray-800 mb-2">${c.name}</h3>
                        <p class="text-gray-500 text-sm mb-6 italic">"${c.vision}"</p>
                        <button onclick="castVote('${c.id}')" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black shadow-xl shadow-indigo-100 active:scale-95 transition-all">PILIH SEKARANG</button>
                    </div>
                `).join('');
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-gray-900">
    <!-- Login Page -->
    <div id="login-v" class="v flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-sm border border-gray-100">
            <div class="text-center mb-10">
                <div class="bg-indigo-600 w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-4 text-white shadow-xl shadow-indigo-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>
                </div>
                <h1 class="text-3xl font-black tracking-tight">E-VOTING</h1>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">Digital OSIS Solution</p>
            </div>
            <input id="u" placeholder="NISN / Username" class="w-full p-4 bg-gray-50 rounded-2xl mb-3 outline-none ring-2 ring-transparent focus:ring-indigo-500 transition-all">
            <input id="p" type="password" placeholder="Password" class="w-full p-4 bg-gray-50 rounded-2xl mb-8 outline-none ring-2 ring-transparent focus:ring-indigo-500 transition-all">
            <button onclick="handleLogin()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black shadow-xl shadow-indigo-200 active:scale-95 transition-all">MASUK SISTEM</button>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="admin-v" class="v hidden p-6 md:p-12 max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-3xl font-black">Admin Panel</h2>
            <button onclick="logout()" class="text-red-500 font-bold">Logout</button>
        </div>
        <div class="grid md:grid-cols-2 gap-10">
            <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-gray-100">
                <h3 class="font-black text-xl mb-6">Manajemen Data</h3>
                <div class="space-y-4">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Tambah Kandidat</p>
                    <input id="cn" placeholder="Nama Calon Ketua" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none">
                    <textarea id="cv" placeholder="Visi & Misi Singkat" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none h-24"></textarea>
                    <button onclick="addCandidate()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold">Simpan Kandidat</button>
                    
                    <hr class="my-10">
                    
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Daftarkan Pemilih (Siswa)</p>
                    <input id="vn" placeholder="Nama Lengkap Siswa" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none">
                    <div class="grid grid-cols-2 gap-3">
                        <input id="vi" placeholder="NISN (User ID)" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none">
                        <input id="vp" placeholder="Password" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none">
                    </div>
                    <button onclick="addVoter()" class="w-full bg-emerald-600 text-white p-4 rounded-2xl font-bold">Daftarkan Siswa</button>
                </div>
            </div>
            <div>
                <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-gray-100 mb-8">
                    <h3 class="font-black text-xl mb-6">Real-time Hasil</h3>
                    <div id="res"></div>
                </div>
                <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-gray-100">
                    <h3 class="font-black text-xl mb-6">Daftar Pemilih</h3>
                    <div id="list" class="max-h-80 overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Voter Panel -->
    <div id="voter-v" class="v hidden p-6 md:p-12 max-w-2xl mx-auto text-center">
        <div class="flex justify-between items-center mb-12 text-left">
            <div>
                <p class="text-indigo-600 font-bold text-xs uppercase tracking-widest">Selamat Datang,</p>
                <h2 class="text-3xl font-black" id="voter-name">Siswa</h2>
            </div>
            <button onclick="logout()" class="p-4 text-red-500 font-bold">Keluar</button>
        </div>
        <div id="cards"></div>
    </div>
</body>
</html>
