<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Voting OSIS Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        // ============================================================
        // KONFIGURASI FIREBASE
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDFD_ZOL4RAyaadaGdk5PJb8BIwG6GInOE",
            authDomain: "testsaja-39ab7.firebaseapp.com",
            projectId: "testsaja-39ab7",
            storageBucket: "testsaja-39ab7.firebasestorage.app",
            messagingSenderId: "503650943182",
            appId: "1:503650943182:web:eec5678291f3bf2774509f",
            measurementId: "G-VSQ3SHGHQL"
        };
        // ============================================================

        const appId = "osis-v1"; 
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let isAdmin = false;
        let candidates = [];
        let voters = [];

        // Mendengarkan perubahan data secara real-time
        const startDataListeners = () => {
            // Monitor Kandidat
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'candidates'), (s) => {
                candidates = s.docs.map(d => ({ id: d.id, ...d.data() }));
                updateUI();
            });

            // Monitor Pemilih
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'voters'), (s) => {
                voters = s.docs.map(d => ({ id: d.id, ...d.data() }));
                updateUI();
            });
        };

        window.onload = async () => {
            try {
                await signInAnonymously(auth);
            } catch (error) {
                console.error("Auth Error:", error);
                if (error.code === 'auth/configuration-not-found') {
                    alert("PENTING: Anonymous Sign-In belum aktif di Firebase Console!");
                }
            }

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    startDataListeners();
                }
            });
        };

        window.handleLogin = () => {
            const userIn = document.getElementById('u').value.trim();
            const passIn = document.getElementById('p').value;

            // Login Admin
            if (userIn === 'admin' && passIn === 'adminosis2024') {
                isAdmin = true; currentUser = null; show('admin-v'); renderAdmin(); return;
            }

            // Login Siswa
            const v = voters.find(x => x.nisn === userIn && x.password === passIn);
            if (v) { 
                currentUser = v; isAdmin = false; show('voter-v'); renderVoter(); 
            } else { 
                alert("ID Siswa atau Password salah!"); 
            }
        };

        window.logout = () => { 
            currentUser = null; 
            isAdmin = false; 
            show('login-v'); 
            document.getElementById('u').value = '';
            document.getElementById('p').value = '';
        };

        // Fungsi Admin: Tambah Kandidat
        window.addCandidate = async () => {
            const n = document.getElementById('cn').value;
            const v = document.getElementById('cv').value;
            if(!n || !v) return alert("Isi nama dan visi misi!");
            await setDoc(doc(collection(db, 'artifacts', appId, 'public', 'data', 'candidates')), { 
                name: n, 
                vision: v, 
                votes: 0 
            });
            document.getElementById('cn').value = ''; 
            document.getElementById('cv').value = '';
        };

        // Fungsi Admin: Hapus Kandidat
        window.deleteCandidate = async (id) => {
            if(confirm("Hapus kandidat ini secara permanen?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'candidates', id));
            }
        };

        // Fungsi Admin: Tambah Pemilih (Siswa)
        window.addVoter = async () => {
            const n = document.getElementById('vn').value;
            const ni = document.getElementById('vi').value;
            const p = document.getElementById('vp').value;
            if(!n || !ni || !p) return alert("Lengkapi data siswa!");
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'voters', ni), { 
                name: n, 
                nisn: ni, 
                password: p, 
                hasVoted: false 
            });
            document.getElementById('vn').value = ''; 
            document.getElementById('vi').value = ''; 
            document.getElementById('vp').value = '';
        };

        // Fungsi Admin: Hapus Pemilih
        window.deleteVoter = async (nisn) => {
            if(confirm("Hapus data siswa ini?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'voters', nisn));
            }
        };

        // Fungsi Siswa: Voting
        window.castVote = async (id) => {
            const fresh = voters.find(x => x.nisn === currentUser.nisn);
            if (fresh.hasVoted) return alert("Anda sudah menggunakan hak suara!");
            
            if(confirm("Yakin dengan pilihan Anda? Pilihan tidak dapat diubah.")) {
                const c = candidates.find(x => x.id === id);
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'candidates', id), { 
                    votes: (c.votes || 0) + 1 
                });
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'voters', currentUser.nisn), { 
                    hasVoted: true 
                });
                alert("Suara Anda berhasil dikirim!");
            }
        };

        function updateUI() { 
            if (isAdmin) renderAdmin(); 
            if (currentUser) renderVoter(); 
        }

        function show(id) { 
            document.querySelectorAll('.v').forEach(x => x.classList.add('hidden')); 
            document.getElementById(id).classList.remove('hidden'); 
        }

        function renderAdmin() {
            // Tampilan Hasil Suara
            document.getElementById('res').innerHTML = candidates.length ? candidates.map(c => `
                <div class="flex justify-between items-center bg-indigo-50 p-4 rounded-2xl mb-2 border border-indigo-100">
                    <div>
                        <div class="font-black text-slate-800">${c.name}</div>
                        <div class="text-xs text-indigo-600 font-bold">${c.votes} Suara</div>
                    </div>
                    <button onclick="deleteCandidate('${c.id}')" class="text-red-400 hover:text-red-600 text-xs font-bold transition-colors">Hapus</button>
                </div>
            `).join('') : '<p class="text-center text-gray-400 text-sm py-4">Belum ada kandidat</p>';
            
            // Tampilan Daftar Pemilih
            document.getElementById('list').innerHTML = voters.length ? voters.map(v => `
                <div class="flex justify-between items-center text-sm border-b py-3 px-2 hover:bg-slate-50 transition-colors">
                    <div>
                        <div class="font-bold text-slate-700">${v.name}</div>
                        <div class="text-[10px] text-gray-400 font-mono">NISN: ${v.nisn} | PW: ${v.password}</div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-[10px] font-black px-2 py-0.5 rounded-full ${v.hasVoted ? 'bg-green-100 text-green-600' : 'bg-gray-100 text-gray-400'}">
                            ${v.hasVoted ? 'SUDAH' : 'BELUM'}
                        </span>
                        <button onclick="deleteVoter('${v.nisn}')" class="text-gray-300 hover:text-red-500 font-bold text-lg leading-none">&times;</button>
                    </div>
                </div>
            `).join('') : '<p class="text-center text-gray-400 text-sm py-10">Belum ada daftar pemilih</p>';
        }

        function renderVoter() {
            const me = voters.find(x => x.nisn === currentUser.nisn);
            if (!me) return;
            document.getElementById('voter-name').innerText = me.name;
            
            if (me.hasVoted) { 
                document.getElementById('cards').innerHTML = `
                    <div class="bg-white p-12 rounded-[3rem] shadow-xl text-green-600 border border-green-50">
                        <div class="text-5xl mb-4">✅</div>
                        <h2 class="font-black text-2xl tracking-tighter">TERIMA KASIH!</h2>
                        <p class="text-sm font-normal text-gray-400 mt-2">Partisipasi Anda sangat berarti untuk sekolah kita.</p>
                    </div>`; 
            } else {
                document.getElementById('cards').innerHTML = candidates.length ? candidates.map(c => `
                    <div class="p-8 bg-white shadow-lg rounded-[2.5rem] mb-6 text-center border border-gray-100 transform transition hover:scale-[1.02]">
                        <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4 font-black text-xl">
                            ${c.name.charAt(0)}
                        </div>
                        <h3 class="font-black text-2xl mb-2 text-slate-800">${c.name}</h3>
                        <p class="text-gray-500 text-sm italic mb-8 leading-relaxed">"${c.vision}"</p>
                        <button onclick="castVote('${c.id}')" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black shadow-xl shadow-indigo-100 active:scale-95 transition-all">PILIH KANDIDAT INI</button>
                    </div>
                `).join('') : '<div class="py-20 text-gray-400">Menunggu admin memasukkan data kandidat...</div>';
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: -0.02em; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-gray-900 antialiased">
    <!-- Login Screen -->
    <div id="login-v" class="v flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-12 rounded-[3.5rem] shadow-2xl w-full max-w-sm border border-gray-100">
            <div class="mb-10 text-center">
                <div class="w-16 h-16 bg-indigo-600 rounded-3xl rotate-12 mx-auto mb-6 shadow-xl shadow-indigo-200 flex items-center justify-center text-white font-black text-3xl">-</div>
                <h1 class="text-4xl font-black tracking-tighter">VOTING<span class="text-indigo-600">.</span></h1>
                <p class="text-gray-400 text-sm mt-1 uppercase tracking-widest font-bold">E-Voting OSIS</p>
            </div>
            <div class="space-y-3">
                <input id="u" placeholder="NISN atau Username" class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all border border-transparent">
                <input id="p" type="password" placeholder="Password" class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all border border-transparent">
                <button onclick="handleLogin()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black shadow-xl shadow-indigo-100 hover:bg-indigo-700 active:scale-95 transition-all">MASUK SISTEM</button>
            </div>
        </div>
    </div>

    <!-- Admin Screen -->
    <div id="admin-v" class="v hidden p-6 md:p-12 max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-3xl font-black tracking-tight text-slate-800">Panel Kendali</h2>
                <p class="text-gray-400 text-sm">Kelola kandidat dan daftar pemilih</p>
            </div>
            <button onclick="logout()" class="px-6 py-2 bg-red-50 text-red-500 rounded-full font-bold text-sm hover:bg-red-100 transition-colors">Keluar</button>
        </div>
        
        <div class="grid lg:grid-cols-12 gap-8">
            <div class="lg:col-span-5 space-y-6">
                <!-- Tambah Kandidat -->
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100">
                    <h3 class="font-black text-lg mb-6 text-slate-700">Kandidat Baru</h3>
                    <input id="cn" placeholder="Nama Lengkap Kandidat" class="w-full p-3 bg-gray-50 rounded-xl mb-2 outline-none border border-gray-100 focus:border-indigo-300">
                    <textarea id="cv" placeholder="Visi Misi Singkat" class="w-full p-3 bg-gray-50 rounded-xl mb-4 outline-none h-20 border border-gray-100 focus:border-indigo-300"></textarea>
                    <button onclick="addCandidate()" class="w-full bg-indigo-600 text-white p-3 rounded-xl font-bold hover:bg-indigo-700">Publikasikan Kandidat</button>
                    <div id="res" class="mt-8 space-y-2"></div>
                </div>
                
                <!-- Tambah Pemilih -->
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100">
                    <h3 class="font-black text-lg mb-6 text-slate-700">Registrasi Pemilih</h3>
                    <input id="vn" placeholder="Nama Siswa" class="w-full p-3 bg-gray-50 rounded-xl mb-2 outline-none border border-gray-100 focus:border-emerald-300">
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <input id="vi" placeholder="NISN / ID" class="w-full p-3 bg-gray-50 rounded-xl outline-none border border-gray-100 focus:border-emerald-300">
                        <input id="vp" placeholder="Password" class="w-full p-3 bg-gray-50 rounded-xl outline-none border border-gray-100 focus:border-emerald-300">
                    </div>
                    <button onclick="addVoter()" class="w-full bg-emerald-600 text-white p-3 rounded-xl font-bold hover:bg-emerald-700">Daftarkan Siswa</button>
                </div>
            </div>

            <!-- List Pemilih -->
            <div class="lg:col-span-7 bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100 overflow-hidden flex flex-col">
                <h3 class="font-black text-lg mb-6 text-slate-700">Status Pemilih Real-time</h3>
                <div id="list" class="flex-grow overflow-y-auto pr-2 custom-scroll"></div>
            </div>
        </div>
    </div>

    <!-- Voter Screen -->
    <div id="voter-v" class="v hidden p-6 md:p-12 max-w-xl mx-auto text-center">
        <div class="flex justify-between items-center mb-10 text-left">
            <div>
                <p class="text-xs font-bold text-indigo-600 uppercase tracking-widest">Surat Suara Digital</p>
                <h2 class="text-3xl font-black text-slate-800" id="voter-name">...</h2>
            </div>
            <button onclick="logout()" class="p-3 bg-white shadow-sm border rounded-2xl text-red-500 font-bold hover:bg-red-50 transition-colors">X</button>
        </div>
        <div id="cards" class="animate-in fade-in slide-in-from-bottom-4 duration-700"></div>
    </div>
</body>
</html>
