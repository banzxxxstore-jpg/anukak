<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOTE E-OSIS | Digital Election</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        // ============================================================
        // KONFIGURASI FIREBASE
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDFD_ZOL4RAyaadaGdk5PJb8BIwG6GInOE",
            authDomain: "testsaja-39ab7.firebaseapp.com",
            projectId: "testsaja-39ab7",
            storageBucket: "testsaja-39ab7.firebasestorage.app",
            messagingSenderId: "503650943182",
            appId: "1:503650943182:web:eec5678291f3bf2774509f",
            measurementId: "G-VSQ3SHGHQL"
        };
        // ============================================================

        const appId = "osis-v1"; 
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let isAdmin = false;
        let candidates = [];
        let voters = [];

        // Custom Modal Function (Ganti alert browser)
        window.showModal = (msg, type = 'info') => {
            const modal = document.getElementById('custom-modal');
            const modalMsg = document.getElementById('modal-msg');
            const modalIcon = document.getElementById('modal-icon');
            
            modalMsg.innerText = msg;
            modalIcon.innerHTML = type === 'error' ? '✕' : (type === 'success' ? '✓' : 'ℹ');
            modalIcon.className = `w-12 h-12 rounded-full flex items-center justify-center text-2xl font-bold mb-4 ${type === 'error' ? 'bg-red-100 text-red-600' : 'bg-indigo-100 text-indigo-600'}`;
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        };

        window.closeModal = () => {
            document.getElementById('custom-modal').classList.add('hidden');
            document.getElementById('custom-modal').classList.remove('flex');
        };

        const startDataListeners = () => {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'candidates'), (s) => {
                candidates = s.docs.map(d => ({ id: d.id, ...d.data() }));
                updateUI();
            });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'voters'), (s) => {
                voters = s.docs.map(d => ({ id: d.id, ...d.data() }));
                updateUI();
            });
        };

        window.onload = async () => {
            try { await signInAnonymously(auth); } catch (e) { console.error(e); }
            onAuthStateChanged(auth, (user) => { if (user) startDataListeners(); });
        };

        window.handleLogin = () => {
            const userIn = document.getElementById('u').value.trim();
            const passIn = document.getElementById('p').value;
            if (userIn === 'admin' && passIn === 'adminosis2024') {
                isAdmin = true; currentUser = null; show('admin-v'); renderAdmin(); return;
            }
            const v = voters.find(x => x.nisn === userIn && x.password === passIn);
            if (v) { currentUser = v; isAdmin = false; show('voter-v'); renderVoter(); } 
            else { showModal("ID Siswa atau Password salah!", "error"); }
        };

        window.logout = () => { 
            currentUser = null; isAdmin = false; show('login-v'); 
            document.getElementById('u').value = ''; document.getElementById('p').value = '';
        };

        window.addCandidate = async () => {
            const n = document.getElementById('cn').value;
            const v = document.getElementById('cv').value;
            const img = document.getElementById('ci').value;
            if(!n || !v) return showModal("Harap lengkapi nama dan visi misi!", "error");
            await setDoc(doc(collection(db, 'artifacts', appId, 'public', 'data', 'candidates')), { 
                name: n, vision: v, votes: 0,
                imageUrl: img || `https://ui-avatars.com/api/?name=${encodeURIComponent(n)}&background=random`
            });
            document.getElementById('cn').value = ''; document.getElementById('cv').value = ''; document.getElementById('ci').value = '';
            showModal("Kandidat berhasil ditambahkan!", "success");
        };

        window.addVoter = async () => {
            const n = document.getElementById('vn').value;
            const ni = document.getElementById('vi').value;
            const p = document.getElementById('vp').value;
            if(!n || !ni || !p) return showModal("Lengkapi data pemilih!", "error");
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'voters', ni), { 
                name: n, nisn: ni, password: p, hasVoted: false, votedFor: null 
            });
            document.getElementById('vn').value = ''; document.getElementById('vi').value = ''; document.getElementById('vp').value = '';
            showModal("Siswa berhasil didaftarkan!", "success");
        };

        // Fungsi Hapus Pemilih + Hapus Suara
        window.deleteVoter = async (nisn) => {
            const v = voters.find(x => x.nisn === nisn);
            if (!v) return;

            if (confirm(`Hapus pemilih ${v.name}? Jika sudah memilih, suaranya akan dikurangi dari kandidat.`)) {
                // Jika user sudah memilih, kurangi suara kandidatnya
                if (v.hasVoted && v.votedFor) {
                    const cRef = doc(db, 'artifacts', appId, 'public', 'data', 'candidates', v.votedFor);
                    const cSnap = await getDoc(cRef);
                    if (cSnap.exists()) {
                        const currentVotes = cSnap.data().votes || 0;
                        await updateDoc(cRef, { votes: Math.max(0, currentVotes - 1) });
                    }
                }
                // Hapus data pemilih
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'voters', nisn));
                showModal("Data pemilih dan suaranya berhasil dihapus.", "success");
            }
        };

        window.castVote = async (id) => {
            const me = voters.find(x => x.nisn === currentUser.nisn);
            if (me.hasVoted) return showModal("Anda sudah memilih!", "error");
            
            if (confirm("Yakin dengan pilihan Anda?")) {
                const c = candidates.find(x => x.id === id);
                // Update Suara Kandidat
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'candidates', id), { 
                    votes: (c.votes || 0) + 1 
                });
                // Update Status Pemilih + Catat pilih siapa (untuk sinkronisasi hapus)
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'voters', currentUser.nisn), { 
                    hasVoted: true,
                    votedFor: id
                });
                showModal("Terima kasih! Suara Anda telah masuk.", "success");
            }
        };

        function updateUI() { if (isAdmin) renderAdmin(); if (currentUser) renderVoter(); }
        function show(id) { document.querySelectorAll('.v').forEach(x => x.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }

        function renderAdmin() {
            document.getElementById('res').innerHTML = candidates.map(c => `
                <div class="bg-white/60 backdrop-blur-md p-4 rounded-3xl mb-3 flex justify-between items-center border border-white shadow-sm">
                    <div class="flex items-center gap-4">
                        <img src="${c.imageUrl}" class="w-12 h-12 rounded-2xl object-cover shadow-sm">
                        <div>
                            <p class="font-bold text-slate-800">${c.name}</p>
                            <p class="text-xs font-black text-indigo-500 uppercase tracking-tighter">${c.votes} SUARA</p>
                        </div>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('list').innerHTML = voters.map(v => `
                <div class="flex justify-between items-center py-4 border-b border-slate-100 px-2 group">
                    <div>
                        <p class="font-bold text-slate-700 group-hover:text-indigo-600 transition-colors">${v.name}</p>
                        <p class="text-[10px] text-slate-400 font-mono">${v.nisn} • PW: ${v.password}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="px-3 py-1 rounded-full text-[10px] font-black tracking-widest ${v.hasVoted ? 'bg-green-100 text-green-600' : 'bg-slate-100 text-slate-400'}">
                            ${v.hasVoted ? 'VOTED' : 'WAIT'}
                        </span>
                        <button onclick="deleteVoter('${v.nisn}')" class="text-slate-300 hover:text-red-500 transition-colors font-bold text-xl">&times;</button>
                    </div>
                </div>
            `).join('') || '<p class="text-center text-slate-400 text-xs py-10 tracking-widest uppercase">Belum ada pemilih</p>';
        }

        function renderVoter() {
            const me = voters.find(x => x.nisn === currentUser.nisn);
            if (!me) return;
            if (me.hasVoted) {
                document.getElementById('v-cards').innerHTML = `
                    <div class="bg-white/80 backdrop-blur-xl p-10 rounded-[3rem] shadow-2xl border border-white text-center animate-in zoom-in duration-500">
                        <div class="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-4xl mx-auto mb-6 shadow-inner">✓</div>
                        <h2 class="text-3xl font-black text-slate-800 tracking-tighter">SUARA TERKIRIM</h2>
                        <p class="text-slate-400 mt-2 text-sm">Terima kasih atas partisipasi Anda.</p>
                        <button onclick="logout()" class="mt-10 px-8 py-3 bg-slate-100 text-slate-600 rounded-2xl font-bold hover:bg-slate-200 transition-all">Keluar</button>
                    </div>`;
            } else {
                document.getElementById('v-cards').innerHTML = candidates.length ? candidates.map(c => `
                    <div class="bg-white/70 backdrop-blur-lg rounded-[3.5rem] overflow-hidden border border-white shadow-xl mb-8 group transition-all hover:shadow-2xl hover:-translate-y-1">
                        <div class="h-80 relative overflow-hidden">
                            <img src="${c.imageUrl}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                            <div class="absolute inset-0 bg-gradient-to-t from-slate-900/80 via-transparent to-transparent"></div>
                            <div class="absolute bottom-6 left-8 right-8">
                                <h3 class="text-3xl font-black text-white leading-none tracking-tight">${c.name}</h3>
                            </div>
                        </div>
                        <div class="p-10 text-center">
                            <p class="text-slate-500 text-sm leading-relaxed mb-8 italic">"${c.vision}"</p>
                            <button onclick="castVote('${c.id}')" class="w-full bg-indigo-600 text-white py-5 rounded-[2rem] font-black text-lg shadow-lg shadow-indigo-200 active:scale-95 transition-all hover:bg-indigo-700 uppercase tracking-widest">Pilih Sekarang</button>
                        </div>
                    </div>
                `).join('') : '<p class="text-slate-400 py-20 uppercase font-black tracking-widest text-xs">Menunggu data kandidat...</p>';
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: -0.01em; background: #f8fafc; }
        .bg-mesh {
            background-color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, hsla(232,95%,95%,1) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(245,95%,95%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, hsla(220,95%,95%,1) 0, transparent 50%);
        }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-mesh min-h-screen text-slate-900 overflow-x-hidden antialiased">

    <!-- Login View -->
    <div id="login-v" class="v flex items-center justify-center min-h-screen p-6">
        <div class="bg-white/40 backdrop-blur-2xl p-12 rounded-[4rem] shadow-2xl w-full max-w-sm border border-white relative overflow-hidden text-center">
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-indigo-100 rounded-full blur-3xl opacity-50"></div>
            <div class="relative mb-12">
                <div class="w-20 h-20 bg-indigo-600 rounded-[2rem] rotate-12 mx-auto mb-8 shadow-2xl shadow-indigo-200 flex items-center justify-center text-white font-black text-4xl">✓</div>
                <h1 class="text-4xl font-black tracking-tighter uppercase leading-none">VOTE<span class="text-indigo-600">.</span>OSIS</h1>
                <p class="text-slate-400 text-[10px] font-black mt-3 tracking-[0.2em] uppercase">Digital Election Platform</p>
            </div>
            <div class="space-y-4">
                <input id="u" placeholder="NISN atau Admin" class="w-full p-5 bg-white/50 rounded-3xl border border-white outline-none focus:ring-4 focus:ring-indigo-500/10 transition-all text-sm font-semibold">
                <input id="p" type="password" placeholder="Password" class="w-full p-5 bg-white/50 rounded-3xl border border-white outline-none focus:ring-4 focus:ring-indigo-500/10 transition-all text-sm font-semibold">
                <button onclick="handleLogin()" class="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black text-sm tracking-widest hover:bg-indigo-600 transition-all active:scale-95 shadow-xl shadow-slate-200 uppercase mt-4">Masuk Sistem</button>
            </div>
        </div>
    </div>

    <!-- Voter View -->
    <div id="voter-v" class="v hidden p-8 md:p-12 max-w-xl mx-auto">
        <div class="flex justify-between items-center mb-12">
            <div>
                <p class="text-[10px] font-black text-indigo-500 tracking-[0.3em] uppercase mb-1">E-Election</p>
                <h2 class="text-3xl font-black text-slate-800 tracking-tighter" id="voter-name">Siswa</h2>
            </div>
            <button onclick="logout()" class="p-4 bg-white rounded-3xl text-red-500 shadow-sm hover:bg-red-50 transition-all font-black">✕</button>
        </div>
        <div id="v-cards"></div>
    </div>

    <!-- Admin View -->
    <div id="admin-v" class="v hidden p-6 md:p-12 max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-12">
            <h2 class="text-4xl font-black text-slate-900 tracking-tighter">Admin Panel</h2>
            <button onclick="logout()" class="px-8 py-3 bg-white text-slate-600 rounded-full font-bold shadow-sm hover:bg-red-50 hover:text-red-500 transition-all">Log Out</button>
        </div>
        <div class="grid lg:grid-cols-2 gap-10">
            <div class="space-y-8">
                <!-- Input Section -->
                <div class="bg-white/60 backdrop-blur-xl p-10 rounded-[3.5rem] border border-white shadow-xl">
                    <h3 class="font-black text-xl mb-8 text-slate-800 uppercase tracking-tight">Setup Pemilihan</h3>
                    <div class="space-y-3 mb-10">
                        <input id="cn" placeholder="Nama Kandidat" class="w-full p-4 bg-white/50 rounded-2xl border border-white outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all">
                        <input id="ci" placeholder="Link Foto" class="w-full p-4 bg-white/50 rounded-2xl border border-white outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all">
                        <textarea id="cv" placeholder="Visi & Misi" class="w-full p-4 bg-white/50 rounded-2xl border border-white outline-none focus:ring-2 focus:ring-indigo-500/20 h-24"></textarea>
                        <button onclick="addCandidate()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black hover:bg-indigo-700 transition-all uppercase tracking-widest text-xs">Simpan Kandidat</button>
                    </div>
                    <div id="res"></div>
                </div>
                <div class="bg-white/60 backdrop-blur-xl p-10 rounded-[3.5rem] border border-white shadow-xl">
                    <h3 class="font-black text-xl mb-8 text-slate-800 uppercase tracking-tight">Daftar Pemilih</h3>
                    <div class="space-y-3">
                        <input id="vn" placeholder="Nama Lengkap" class="w-full p-4 bg-white/50 rounded-2xl border border-white outline-none">
                        <div class="grid grid-cols-2 gap-3">
                            <input id="vi" placeholder="NISN" class="w-full p-4 bg-white/50 rounded-2xl border border-white outline-none">
                            <input id="vp" placeholder="Pass" class="w-full p-4 bg-white/50 rounded-2xl border border-white outline-none">
                        </div>
                        <button onclick="addVoter()" class="w-full bg-emerald-600 text-white p-4 rounded-2xl font-black hover:bg-emerald-700 transition-all uppercase tracking-widest text-xs">Tambah Pemilih</button>
                    </div>
                </div>
            </div>
            <div class="bg-white/60 backdrop-blur-xl p-10 rounded-[3.5rem] border border-white shadow-xl flex flex-col max-h-[1000px]">
                <h3 class="font-black text-xl mb-8 text-slate-800 uppercase tracking-tight">Monitoring Real-time</h3>
                <div id="list" class="overflow-y-auto custom-scroll pr-4"></div>
            </div>
        </div>
    </div>

    <!-- Custom Modal -->
    <div id="custom-modal" class="hidden fixed inset-0 z-[999] bg-slate-900/40 backdrop-blur-md items-center justify-center p-6 animate-in fade-in duration-300">
        <div class="bg-white rounded-[3rem] p-10 w-full max-w-xs shadow-2xl border border-white text-center transform animate-in zoom-in duration-300">
            <div class="flex flex-col items-center">
                <div id="modal-icon">ℹ</div>
                <h4 class="font-black text-slate-400 text-[10px] tracking-[0.3em] mb-2 uppercase">VOTE E-OSIS</h4>
                <p id="modal-msg" class="text-slate-700 font-bold mb-8 leading-tight"></p>
                <button onclick="closeModal()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-xs tracking-widest uppercase hover:bg-indigo-600 transition-all shadow-lg shadow-indigo-100">Oke</button>
            </div>
        </div>
    </div>

</body>
</html>
